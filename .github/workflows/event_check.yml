# Event Scheduling — checks active events every 15 min and delivers event-specific news.
# Only does work when bot_state.json has active events with today's date.

name: Event Check

on:
  schedule:
    - cron: "*/15 * * * *"  # Every 15 minutes
  workflow_dispatch: {}   # Manual trigger for testing

permissions:
  contents: write         # Required for EndBug/add-and-commit to push

concurrency:
  group: deliver          # Same group as deliver/breaking to prevent state conflicts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run event check
        run: uv run python -m pipeline.event_runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Commit state back to repo
        uses: EndBug/add-and-commit@v9
        with:
          add: '["data/seen.json", "data/bot_state.json"]'
          message: "chore(state): update after event check [skip ci]"
          default_author: github_actions
