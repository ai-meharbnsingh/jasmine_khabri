# Khabri Pipeline Configuration
# Schedule times are in IST — UTC conversion handled in code (Phase 2)

schedule:
  morning_ist: "07:00"    # MUST be quoted — YAML parses unquoted 07:00 as integer 420
  evening_ist: "16:00"    # MUST be quoted — same reason

telegram:
  bot_token: ""           # Set via TELEGRAM_BOT_TOKEN env var — never commit secrets
  chat_ids: []            # Set via env var or bot registration — both users
  breaking_news_enabled: true

email:
  enabled: true
  recipients: []          # Set via env var — Gmail addresses for both users

delivery:
  max_stories: 15

rss_feeds:
  - name: "MOHUA"
    url: "https://mohua.gov.in/rss.xml"
    enabled: true
  - name: "NHAI"
    url: "https://nhai.gov.in/rss-feed"
    enabled: true
  - name: "AAI"
    url: "https://www.aai.aero/en/rss"
    enabled: true
  - name: "Smart Cities"
    url: "https://smartcities.gov.in/rss"
    enabled: true
  - name: "ET Realty"
    url: "https://economictimes.indiatimes.com/industry/services/property-/-cstruction/rssfeeds/13357555.cms"
    enabled: true
  - name: "TOI Real Estate"
    url: "https://timesofindia.indiatimes.com/rssfeeds/-2950715.cms"
    enabled: true
  - name: "Hindu BL"
