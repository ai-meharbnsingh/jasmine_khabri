# Khabri Pipeline Configuration
# Schedule times are in IST — UTC conversion handled in code (Phase 2)

schedule:
  morning_ist: "07:00"    # MUST be quoted — YAML parses unquoted 07:00 as integer 420
  evening_ist: "16:00"    # MUST be quoted — same reason

telegram:
  bot_token: ""           # Set via TELEGRAM_BOT_TOKEN env var — never commit secrets
  chat_ids: []            # Set via env var or bot registration — both users
  breaking_news_enabled: true

email:
  enabled: true
  recipients: []          # Set via env var — Gmail addresses for both users

delivery:
  max_stories: 15

rss_feeds:
  - name: "ET Realty"
    url: "https://realty.economictimes.indiatimes.com/rss/topstories"
    enabled: true
  - name: "ET Infra"
    url: "https://infra.economictimes.indiatimes.com/rss/topstories"
    enabled: true
  - name: "Housing.com"
    url: "https://housing.com/news/feed/"
    enabled: true
  - name: "Magicbricks"
    url: "https://www.magicbricks.com/blog/feed/"
    enabled: true
  - name: "Square Yards"
    url: "https://www.squareyards.com/blog/feed"
    enabled: true
  - name: "India Infrahub"
    url: "https://www.indiainfrahub.com/feed/"
    enabled: true
  - name: "Livemint Industry"
    url: "https://www.livemint.com/rss/industry"
    enabled: true
  - name: "Hindu BL Economy"
    url: "https://www.thehindubusinessline.com/economy/feeder/default.rss"
    enabled: true
